info:
  contact: {}
  description: |-
    Generic SNAP/ASPI-compliant payment gateway API: B2B access
    token issuance, admin client onboarding, signature-generation
    utilities, and Virtual Account (transfer-VA) transaction and
    merchant-dashboard endpoints.
  title: SNAP Payment Integration Gateway API
  version: "1.0"
paths:
  /admin/clients:
    post:
      description: 'Creates a new client_app trust-anchor record and, if publicKeyPem
        is supplied, its first client_key in the same call. State-changing: creates
        persistent client onboarding records.'
      parameters:
      - description: Static admin API key (ADMIN_API_KEY)
        in: header
        name: X-Admin-API-Key
        required: true
        type: string
      - description: Client registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterClientRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "400":
          description: Invalid payload, missing clientId/clientName/keyId, or invalid
            publicKeyPem
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "401":
          description: Unauthorized. Invalid or missing X-Admin-API-Key header
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "503":
          description: Admin API disabled (ADMIN_API_KEY not set)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - AdminToken: []
      summary: Register a new B2B client
      tags:
      - Admin Client Management
  /admin/clients/{clientId}/keys:
    post:
      description: 'Registers an additional active public key for an existing client
        (e.g. key rotation). State-changing: creates a persistent client_key record.'
      parameters:
      - description: Static admin API key (ADMIN_API_KEY)
        in: header
        name: X-Admin-API-Key
        required: true
        type: string
      - description: Client identifier
        in: path
        name: clientId
        required: true
        type: string
      - description: Client key payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.AddClientKeyRequest'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "400":
          description: Missing clientId, missing keyId/publicKeyPem, or invalid publicKeyPem
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "401":
          description: Unauthorized. Invalid or missing X-Admin-API-Key header
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "503":
          description: Admin API disabled (ADMIN_API_KEY not set)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - AdminToken: []
      summary: Add a client key
      tags:
      - Admin Client Management
  /admin/clients/{clientId}/keys/{keyId}:
    delete:
      description: 'Revokes (deactivates) a client''s public key so it can no longer
        be used to verify signatures. State-changing: updates a persistent client_key
        record.'
      parameters:
      - description: Static admin API key (ADMIN_API_KEY)
        in: header
        name: X-Admin-API-Key
        required: true
        type: string
      - description: Client identifier
        in: path
        name: clientId
        required: true
        type: string
      - description: Key identifier to revoke
        in: path
        name: keyId
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "400":
          description: Missing clientId or keyId path parameters
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "401":
          description: Unauthorized. Invalid or missing X-Admin-API-Key header
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.clientResponse'
        "503":
          description: Admin API disabled (ADMIN_API_KEY not set)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - AdminToken: []
      summary: Revoke a client key
      tags:
      - Admin Client Management
  /api/v1/utilities/signature-auth:
    post:
      description: Generates the SHA256withRSA signature required as X-SIGNATURE when
        calling POST /openapi/v1.0/access-token/b2b.
      parameters:
      - description: Client identifier
        in: header
        name: X-CLIENT-KEY
        required: true
        type: string
      - description: Request timestamp, ISO 8601
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - description: RSA private key (PEM) used to sign the string-to-sign
        in: header
        name: Private_Key
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.SignatureAuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.SignatureAuthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.SignatureAuthResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.SignatureAuthResponse'
      summary: Generate the asymmetric access-token signature
      tags:
      - Signature Utilities
  /api/v1/utilities/signature-service:
    post:
      description: Generates the HMAC-SHA512 signature required as X-SIGNATURE when
        calling SNAP-protected transaction endpoints (transfer-VA, merchant VA dashboard)
        with an issued access token.
      parameters:
      - description: Client secret shared with the partner
        in: header
        name: X-CLIENT-SECRET
        required: true
        type: string
      - description: HTTP method of the target request, e.g. POST
        in: header
        name: HttpMethod
        required: true
        type: string
      - description: Relative path of the target request, e.g. /openapi/v1.0/transfer-va/inquiry
        in: header
        name: EndpointUrl
        required: true
        type: string
      - description: Bearer access token issued by POST /openapi/v1.0/access-token/b2b
        in: header
        name: AccessToken
        required: true
        type: string
      - description: Request timestamp, ISO 8601
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - description: Raw request body of the target request, used verbatim in the
          string-to-sign
        in: body
        name: request
        required: true
        schema:
          type: object
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.SignatureServiceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/domain.SignatureServiceResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/domain.SignatureServiceResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.SignatureServiceResponse'
      summary: Generate the symmetric service (transaction) signature
      tags:
      - Signature Utilities
  /health:
    get:
      description: Returns 200 with a static status payload if the service process
        is up. Does not check downstream dependencies (DB/Redis).
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Service health check
      tags:
      - Health
  /openapi/v1.0/access-token/b2b:
    post:
      description: Issues a bearer access token for a registered client, after verifying
        the asymmetric X-SIGNATURE against the client's registered public key. This
        endpoint ISSUES the token — the caller has no prior bearer token; auth is
        via the X-CLIENT-KEY/X-TIMESTAMP/X-SIGNATURE headers only. Use POST /api/v1/utilities/signature-auth
        to compute X-SIGNATURE.
      parameters:
      - description: Client identifier issued at onboarding
        in: header
        name: X-CLIENT-KEY
        required: true
        type: string
      - description: Request timestamp, ISO 8601 (e.g. 2026-07-24T10:00:00+07:00)
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - description: Asymmetric signature; compute via POST /api/v1/utilities/signature-auth
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - description: Unique key for this request; enforced by IdempotencyMiddleware
          for all non-GET requests on this route. A repeated key with an identical
          payload replays the cached response; a repeated key with a different payload
          is rejected with 422.
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Token request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.SNAPTokenRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.SNAPTokenResponse'
        "400":
          description: Invalid request payload, missing required SNAP headers, or
            missing Idempotency-Key
          schema:
            $ref: '#/definitions/domain.SNAPTokenResponse'
        "401":
          description: Signature verification failed
          schema:
            $ref: '#/definitions/domain.SNAPTokenResponse'
        "409":
          description: 'Conflict: request already in progress for this Idempotency-Key'
          schema:
            $ref: '#/definitions/domain.SNAPTokenResponse'
        "422":
          description: Idempotency-Key reused with a different payload
          schema:
            $ref: '#/definitions/domain.SNAPTokenResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/domain.SNAPTokenResponse'
      security:
      - SnapClientKey: []
      - SnapTimestamp: []
      - SnapSignature: []
      summary: Issue a SNAP B2B access token
      tags:
      - Token
  /openapi/v1.0/transfer-va/create-va:
    post:
      description: |-
        Merchant-initiated upsert of a Virtual Account (ASPI VAUpsertRequest). This performs a real state-changing action: it creates or updates a persistent Virtual Account record.
        To register a payment-notification callback URL, set additionalInfo.dbUrlProcess (e.g. {"additionalInfo": {"dbUrlProcess": "https://merchant.example.com/webhook/payment-callback"}}) — per ASPI's VAUpsertRequest, this is the only defined key under additionalInfo; it is not a top-level request field.
      parameters:
      - description: Request timestamp, ISO 8601
        in: header
        name: X-TIMESTAMP
        required: true
        type: string
      - description: Symmetric signature; compute via POST /api/v1/utilities/signature-service
        in: header
        name: X-SIGNATURE
        required: true
        type: string
      - description: Unique external ID for this request
        in: header
        name: X-EXTERNAL-ID
        required: true
        type: string
      - description: Unique key for this request; enforced by IdempotencyMiddleware.
          A repeated key with an identical payload replays the cached response; a
          repeated key with a different payload is rejected with 422.
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: VA create/update request. additionalInfo.dbUrlProcess carries
          the merchant payment-callback URL (see description).
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.MerchantCreateVARequest'
      responses:
        "200":
          description: additionalInfo.dbUrlProcess is echoed back in virtualAccountData.additionalInfo
          schema:
