securityDefinitions:
  AdminToken:
    description: Static admin API key configured via the ADMIN_API_KEY environment
      variable. Required for all /admin/* endpoints.
    in: header
    name: X-Admin-API-Key
    type: apiKey
  BearerAuth:
    description: Bearer access token issued by POST /openapi/v1.0/access-token/b2b,
      e.g. "Bearer <token>".
    in: header
    name: Authorization
    type: apiKey
  SnapClientKey:
    description: Client identifier issued by the admin during onboarding. Required
      on the B2B access-token endpoint.
    in: header
    name: X-CLIENT-KEY
    type: apiKey
  SnapSignature:
    description: Request signature. Compute via POST /api/v1/utilities/signature-auth
      (asymmetric, access-token endpoint) or POST /api/v1/utilities/signature-service
      (symmetric, transaction endpoints).
    in: header
    name: X-SIGNATURE
    type: apiKey
  SnapTimestamp:
    description: Request timestamp in ISO 8601 format (e.g. 2026-07-24T10:00:00+07:00).
    in: header
    name: X-TIMESTAMP
    type: apiKey
swagger: "2.0"
